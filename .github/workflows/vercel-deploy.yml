# Deploy su Vercel da GitHub Actions (nuovo deployment su ogni push su main).
# Secret richiesti: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.

name: Deploy (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build (Vercel)
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
