name: Build Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  dist-win:
    runs-on: windows-latest
    permissions:
      # `contents: write` serve a electron-builder per creare/aggiornare la Release e caricare
      # installer + `latest.yml` (feed usato da electron-updater sulle installazioni già presenti).
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # `npm ci` fallisce con questo lockfile (peer/opzionali @emnapi su toolchain diverse).
      # `npm install` in CI è ok qui; Bash + set -e evita di proseguire se l'install fallisce.
      - name: Install, build installer, publish to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run dist:win:publish

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error
