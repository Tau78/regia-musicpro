name: Build Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  dist-win:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # `npm ci` fallisce con questo lockfile (peer/opzionali @emnapi su toolchain diverse).
      # `npm install` in CI è ok qui; Bash + set -e evita di proseguire se l'install fallisce.
      - name: Install and build installer
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run dist:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error

      # Opzionale: Google Drive (Git non carica su Drive; qui passa rclone con account di servizio).
      # Repo → Settings → Secrets: GDRIVE_SA_JSON_B64 (JSON SA in base64), GDRIVE_FOLDER_ID (id cartella).
      # La cartella su Drive va condivisa con l’email dell’account di servizio (Editor).
      - name: Copia installer su Google Drive (se configurato)
        shell: bash
        env:
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail
          echo "=== Drive: inizio step ==="
          if [ -z "${GDRIVE_SA_JSON_B64:-}" ] || [ -z "${GDRIVE_FOLDER_ID:-}" ]; then
            echo ">>> BLOCCO: uno o entrambi i segreti sono vuoti in questo run."
            echo "    Controlla: Repo → Settings → Secrets → Actions (nomi esatti: GDRIVE_SA_JSON_B64, GDRIVE_FOLDER_ID)."
            echo "    I segreti di un *Environment* non si usano se il job non ha 'environment:'."
            echo ">>> Salto upload (exit 0)."
            exit 0
          fi
          echo ">>> Segreti presenti: B64 lunghezza=${#GDRIVE_SA_JSON_B64} caratteri, FOLDER_ID lunghezza=${#GDRIVE_FOLDER_ID}"
          echo "=== Drive: file in release/ prima della copia ==="
          ls -la "${GITHUB_WORKSPACE}/release/" || { echo ">>> ERRORE: cartella release/ assente"; exit 1; }
          SA_LOCAL="${GITHUB_WORKSPACE}/.gdrive-sa.json"
          echo "=== Drive: decodifica JSON account di servizio ==="
          python3 -c "import base64,os,pathlib; pathlib.Path(os.environ['GITHUB_WORKSPACE'],'.gdrive-sa.json').write_bytes(base64.b64decode(os.environ['GDRIVE_SA_JSON_B64']))"
          echo ">>> File SA scritto, dimensione=$(wc -c < "${SA_LOCAL}" | tr -d ' ') byte"
          SA_WIN=$(python3 -c "import pathlib,os; print(str(pathlib.Path(os.environ['GITHUB_WORKSPACE']) / '.gdrive-sa.json'))")
          echo "=== Drive: scarico rclone (Windows) ==="
          cd "${RUNNER_TEMP}"
          curl -fsSL -o rclone.zip "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          unzip -qo rclone.zip
          RCLONE_DIR=$(echo rclone-*-windows-amd64 | head -1)
          if [ -z "${RCLONE_DIR}" ] || [ ! -d "${RUNNER_TEMP}/${RCLONE_DIR}" ]; then
            echo ">>> ERRORE: cartella rclone-*-windows-amd64 non trovata dopo unzip"; ls -la; exit 1
          fi
          echo ">>> rclone dir: ${RCLONE_DIR}"
          export PATH="${RUNNER_TEMP}/${RCLONE_DIR}:${PATH}"
          rclone version
          export RCLONE_CONFIG_GD_TYPE=drive
          export RCLONE_CONFIG_GD_SCOPE=drive
          export RCLONE_CONFIG_GD_SERVICE_ACCOUNT_FILE="${SA_WIN}"
          export RCLONE_CONFIG_GD_ROOT_FOLDER_ID="${GDRIVE_FOLDER_ID}"
          echo "=== Drive: test lettura remoto (lista file in cartella) ==="
          rclone ls "gd:" -v --max-depth 1 || { echo ">>> ERRORE: impossibile elencare gd: (permessi Drive / ID cartella / condivisione con SA?)"; exit 1; }
          echo "=== Drive: copia .exe ==="
          rclone copy "${GITHUB_WORKSPACE}/release/" "gd:" --include "*.exe" -v
          echo "=== Drive: elenco dopo copia ==="
          rclone ls "gd:" -v --max-depth 1
          rm -f "${SA_LOCAL}"
          echo "=== Drive: fine step OK ==="
