name: Build Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  dist-win:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # `npm ci` fallisce con questo lockfile (peer/opzionali @emnapi su toolchain diverse).
      # `npm install` in CI è ok qui; Bash + set -e evita di proseguire se l'install fallisce.
      - name: Install and build installer
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run dist:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error
