name: Build Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  dist-win:
    runs-on: windows-latest
    permissions:
      # `contents: write` serve a electron-builder per creare/aggiornare la Release e caricare
      # installer + `latest.yml` (feed usato da electron-updater sulle installazioni già presenti).
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # `npm ci` fallisce con questo lockfile (peer/opzionali @emnapi su toolchain diverse).
      # `npm install` in CI è ok qui; Bash + set -e evita di proseguire se l'install fallisce.
      - name: Install, build installer, publish to GitHub Release
        shell: bash
        env:
          # Token sempre disponibile in Actions per questo repo (non serve un PAT nei secrets).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          # Download di nsis-resources/electron-builder-binaries può rispondere 504 (timeout GitHub): riprova.
          ATTEMPTS=4
          for attempt in 1 2 3 4; do
            if npm run dist:win:publish; then
              exit 0
            fi
            if [ "$attempt" -ge "$ATTEMPTS" ]; then
              echo "dist:win:publish fallito dopo ${ATTEMPTS} tentativi." >&2
              exit 1
            fi
            echo "Tentativo ${attempt} fallito (es. 504 su download). Attesa 90s e nuovo tentativo..."
            sleep 90
          done

      - name: Upload installer and update manifest
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
