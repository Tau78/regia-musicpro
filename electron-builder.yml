# Pacchetto per utenti finali (Windows installer NSIS).
# Esegui: npm run dist:win (su Windows) oppure workflow GitHub Actions.

appId: com.regiavideo.musicpro
productName: REGIA MUSICPRO

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

asar: true

# Auto-updater (electron-updater): in fase di build viene generato `app-update.yml` nel pacchetto.
# Per pubblicare una release: `npm run dist:win:publish` con variabile `GH_TOKEN` (vedi README o istruzioni sotto).
# Se sposti il repo su GitHub, aggiorna `owner` / `repo`.
publish:
  provider: github
  owner: Tau78
  repo: regia-musicpro

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: '${productName}-Setup-${version}.${ext}'

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
