# Pacchetto per utenti finali (Windows installer NSIS).
# Esegui: npm run dist:win (su Windows) oppure workflow GitHub Actions.

appId: com.regiavideo.musicpro
productName: REGIA MUSICPRO

# Icona app (PNG 512×512 o superiore; electron-builder genera .ico per Windows).
icon: build/icon.png

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

asar: true

# I moduli nativi non possono restare dentro app.asar. `node-hid` serve al
# controller Bluetooth/HID e va lasciato unpacked per evitare crash in produzione.
asarUnpack:
  - node_modules/node-hid/**/*
  - node_modules/node-addon-api/**/*
  - node_modules/pkg-prebuilds/**/*

# Auto-updater (electron-updater): in fase di build viene generato `app-update.yml` nel pacchetto.
# `releaseType: release` = release pubblicata (badge «Latest»), NON bozza — il default di electron-builder è draft.
# Per pubblicare da PC: `npm run dist:win:publish` con `GH_TOKEN`. In CI vedi workflow (GITHUB_TOKEN).
# Se sposti il repo su GitHub, aggiorna `owner` / `repo`.
publish:
  provider: github
  owner: Tau78
  repo: regia-musicpro
  releaseType: release

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: '${productName}-Setup-${version}.${ext}'

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSBluetoothAlwaysUsageDescription: REGIA MUSICPRO usa Bluetooth solo per leggere il controller HID appreso.
    NSInputMonitoringUsageDescription: REGIA MUSICPRO legge il controller HID appreso per jog e pulsanti dedicati.

# In aggiornamento, electron-updater avvia l'installer con `/S` + `--updated`: pagine guidate saltate (anche con oneClick: false).
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
